<!DOCTYPE html>
<html lang="zh-Hant"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>我的書房</title>
<style>
:root{--bg:#f3f4f7;--card:#fff;--ink:#16203a;--sub:#6b7280;--brand:#2F5496;--brand2:#3f6bc4;
--soft:#eaf0fb;--line:#e8eaf0;--ok:#15803d;--warn:#c2410c;--rose:#e11d48;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;padding-bottom:78px}
header{position:sticky;top:0;z-index:20;color:#fff;padding:calc(14px + env(safe-area-inset-top)) 16px 12px;
background:linear-gradient(135deg,#1f2a44,#2F5496 60%,#3f6bc4);box-shadow:0 3px 14px rgba(15,23,42,.18)}
.htop{display:flex;align-items:center;justify-content:space-between}
header h1{font-size:20px;margin:0;font-weight:800;letter-spacing:1px}
.count{font-size:12px;opacity:.9;font-weight:600}
.search{margin-top:12px;position:relative}
.search input{width:100%;border:0;border-radius:12px;padding:12px 14px 12px 40px;font-size:15px;background:rgba(255,255,255,.96);color:var(--ink)}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.45}
.chips{display:flex;gap:8px;overflow-x:auto;padding:11px 16px 5px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--sub);padding:7px 14px;border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap}
.chip.on{background:var(--brand);border-color:var(--brand);color:#fff}
main{padding:8px 12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:12px;margin-bottom:11px;display:flex;gap:13px;align-items:stretch;box-shadow:0 1px 3px rgba(16,24,40,.05)}
.cover{flex:0 0 52px;height:72px;border-radius:8px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:7px 6px;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.cover::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:rgba(255,255,255,.35)}
.cover span{font-size:10px;font-weight:800;line-height:1.15;text-shadow:0 1px 2px rgba(0,0,0,.35);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.meta{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.title{font-size:15px;font-weight:800;line-height:1.34;margin:0 0 3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.byline{font-size:12.5px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tags{margin-top:7px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700}
.dot{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700}
.dot i{width:7px;height:7px;border-radius:50%;display:inline-block}
.lend-ok{color:var(--ok)} .lend-ok i{background:var(--ok)}
.lend-out{color:var(--rose)} .lend-out i{background:var(--rose)}
.lend-no{color:var(--sub)} .lend-no i{background:var(--sub)}
.empty{text-align:center;color:var(--sub);padding:56px 20px;font-size:14px;line-height:1.7}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;border:0;background:none;color:var(--sub);font-size:11px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 7px;position:relative}
nav button.on{color:var(--brand)}
nav .badge{position:absolute;top:4px;right:50%;margin-right:-26px;background:var(--rose);color:#fff;border-radius:999px;font-size:10px;padding:0 5px;line-height:16px;min-width:16px;text-align:center}
.scrim{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:40;opacity:0;pointer-events:none;transition:.2s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:#fff;border-radius:22px 22px 0 0;padding:8px 20px calc(26px + env(safe-area-inset-bottom));transform:translateY(100%);transition:.28s cubic-bezier(.32,.72,0,1);max-height:90vh;overflow:auto}
.sheet.show{transform:translateY(0)}
.grip{width:42px;height:5px;border-radius:3px;background:#dfe3ea;margin:8px auto 16px}
.sheet h2{font-size:21px;margin:0 0 4px;line-height:1.3}
.sheet .sb{color:var(--sub);font-size:13.5px;margin-bottom:14px}
.row{display:flex;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
.row .k{flex:0 0 84px;color:var(--sub)}.row .v{flex:1;font-weight:600}
.note{margin-top:13px;background:#fbfbe9;border:1px solid #f1f0c8;color:#7a6f12;padding:10px 12px;border-radius:10px;font-size:13px}
.btn{display:block;width:100%;border:0;border-radius:13px;padding:15px;font-size:16px;font-weight:800;margin-top:14px;color:#fff;background:var(--brand)}
.btn.ghost{background:#fff;color:var(--brand);border:1.5px solid var(--brand)}
.btn.danger{background:#fff;color:var(--rose);border:1.5px solid #f3b7c2}
.btn[disabled]{background:#cbd2de;color:#fff}
label.fld{display:block;font-size:13px;color:var(--sub);margin:14px 0 5px;font-weight:700}
.fld input{width:100%;border:1px solid var(--line);border-radius:11px;padding:13px;font-size:15px}
.resv-card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:11px}
.resv-card .rt{font-weight:800;font-size:15px}.resv-card .rd{color:var(--sub);font-size:13px;margin-top:4px}
.ok-banner{background:#e7f6ee;border:1px solid #b7e3ca;color:var(--ok);padding:12px 14px;border-radius:12px;font-size:15px;margin-bottom:14px;font-weight:700}
.toolbar{display:flex;gap:10px;padding:4px 4px 12px}
.toolbar .btn{margin:0;flex:1;padding:12px;font-size:14px}
</style></head><body>

function lendOf(b){if((b.lend||'')==='不外借')return'不外借';
 if(resv[b.no])return'借出中';if(remoteReserved.has(String(b.no)))return'已被預約';return'可借';}

 if(s==='可借')return`<span class="dot lend-ok"><i></i>可借</span>`;
 if(s==='不外借')return`<span class="dot lend-no"><i></i>不外借</span>`;
 if(s==='已被預約')return`<span class="dot lend-out"><i></i>已被預約</span>`;

 v.innerHTML=list.map(b=>`<div class="card" onclick="openBook(${b.no})">
   <div class="cover" style="background:${grad(color(b.category))}"><span>${esc(b.title)}</span></div>
   <div class="meta"><p class="title">${esc(b.title)}</p>
     <div class="byline">${esc(b.author||'—')}${b.publisher?' · '+esc(b.publisher):''}</div>
     <div class="tags"><span class="tag" style="background:${color(b.category)}1a;color:${color(b.category)}">${esc(b.category)}</span>${lendTag(b)}</div>
   </div></div>`).join('');}
function renderResv(){document.getElementById('count').textContent='';
 const v=document.getElementById('view');const items=Object.values(resv).sort((a,b)=>(a.pickup||'').localeCompare(b.pickup||''));
 if(!items.length){v.innerHTML='<div class="empty">尚未預約任何書<br><br>到「書目」點一本書，按「預約借閱」即可。</div>';return;}
 v.innerHTML=`<div class="toolbar"><button class="btn ghost" onclick="exportCSV()">⬇︎ 匯出預約紀錄(CSV)</button><button class="btn" onclick="shareAll()">📩 整批通知書主</button></div>
  <div style="padding:0 4px 6px;font-size:13px;color:var(--sub)">共 ${items.length} 筆預約</div>`+
  items.map(r=>`<div class="resv-card"><div class="rt">${esc(r.title)}</div>
   <div class="rd">預約人：${esc(r.name||'—')}　|　取書日：${esc(r.pickup||'—')}</div>
   ${r.note?`<div class="rd">備註：${esc(r.note)}</div>`:''}
   <div style="display:flex;gap:10px;margin-top:12px">
    <button class="btn ghost" style="margin:0;flex:1;padding:11px" onclick="shareOne(${r.no})">通知書主</button>
    <button class="btn danger" style="margin:0;flex:1;padding:11px" onclick="cancel(${r.no})">取消</button></div></div>`).join('');}
function openBook(no){const b=BOOKS.find(x=>x.no===no),r=resv[no];
 const rows=[['作者',b.author],['譯者',b.translator],['出版社',b.publisher],['叢書／系列',b.series],['分類',b.category],['語言',b.language],['ISBN',b.isbn],['閱讀狀態',b.status]].filter(x=>x[1]);
 let body=`<div class="grip"></div>
   <div style="display:flex;gap:14px;margin-bottom:6px"><div class="cover" style="flex:0 0 64px;height:90px;background:${grad(color(b.category))}"><span>${esc(b.title)}</span></div>
   <div style="align-self:center"><h2 style="font-size:19px">${esc(b.title)}</h2><div class="sb">編號 #${b.no}　${lendTag(b)}</div></div></div>
   ${rows.map(x=>`<div class="row"><div class="k">${x[0]}</div><div class="v">${esc(String(x[1]))}</div></div>`).join('')}
   ${b.note?`<div class="note">📝 ${esc(b.note)}</div>`:''}`;
 if((b.lend||'')==='不外借'){body+=`<button class="btn" disabled>此書不外借</button>`;}
 else if(r){body+=`<div class="note" style="background:#fdece3;border-color:#f6c9ad;color:#9a3412">✅ 你已預約這本，取書日 ${esc(r.pickup||'—')}</div><button class="btn danger" onclick="cancel(${no})">取消這筆預約</button>`;}
 else if(takenByOther(no)){body+=`<div class="note" style="background:#fdece3;border-color:#f6c9ad;color:#9a3412">🔴 這本已被其他人預約，暫時無法預約</div><button class="btn" disabled>已被預約</button>`;}
 else{body+=`<button class="btn" onclick="showForm(${no})">📅 預約借閱</button>`;}
 show(body);}
function showForm(no){const b=BOOKS.find(x=>x.no===no),today=new Date().toISOString().slice(0,10);
 show(`<div class="grip"></div><h2>預約借閱</h2><div class="sb">${esc(b.title)}</div>
  <label class="fld">你的名字<input id="fName" placeholder="例：冠惟"></label>
  <label class="fld">希望取書日期<input id="fDate" type="date" value="${today}"></label>
  <label class="fld">備註（可留空）<input id="fNote" placeholder="例：週三下午在系館"></label>
  <button class="btn" onclick="confirmResv(${no})">確認預約</button>
  <button class="btn ghost" onclick="openBook(${no})">返回</button>`);}
function confirmResv(no){const b=BOOKS.find(x=>x.no===no);
 const name=document.getElementById('fName').value.trim();const pickup=document.getElementById('fDate').value;const note=document.getElementById('fNote').value.trim();
 if(!name){alert('請填寫名字');return;}
 if(takenByOther(no)){alert('抱歉，這本剛被其他人預約了。');closeSheet();loadRemote();render();return;}
 resv[no]={no,title:b.title,name,pickup,note,ts:new Date().toISOString()};save();
 remoteReserved.add(String(no));
 if(ENDPOINT){try{fetch(ENDPOINT,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},
   body:JSON.stringify({no,title:b.title,author:b.author,publisher:b.publisher,name,pickup,note,ts:resv[no].ts})});}catch(e){}
   setTimeout(loadRemote,3000);}
 show(`<div class="grip"></div><div class="ok-banner">✅ 預約成功！</div><h2 style="font-size:19px">${esc(b.title)}</h2>
  <div class="row"><div class="k">預約人</div><div class="v">${esc(name)}</div></div>
  <div class="row"><div class="k">取書日</div><div class="v">${esc(pickup)}</div></div>
  ${note?`<div class="row"><div class="k">備註</div><div class="v">${esc(note)}</div></div>`:''}
  <button class="btn" onclick="shareOne(${no})">📩 通知書主</button>
  <button class="btn ghost" onclick="closeSheet();go('resv')">查看我的預約</button>`);render();}
function shareOne(no){const r=resv[no];if(!r)return;
 const txt=`【借書預約】\n書名：${r.title}\n預約人：${r.name}\n取書日：${r.pickup||'未定'}${r.note?'\n備註：'+r.note:''}`;
 if(navigator.share)navigator.share({title:'借書預約',text:txt}).catch(()=>{});
 else{navigator.clipboard?.writeText(txt);alert('已複製，可貼到 LINE／訊息：\n\n'+txt);}}
function shareAll(){const items=Object.values(resv);if(!items.length)return;
 const txt='【借書預約清單】\n\n'+items.map(r=>`• ${r.title}（${r.name}，取書日 ${r.pickup||'未定'}）`).join('\n');
 if(navigator.share)navigator.share({title:'借書預約清單',text:txt}).catch(()=>{});
 else{navigator.clipboard?.writeText(txt);alert('已複製整批預約：\n\n'+txt);}}
function exportCSV(){const items=Object.values(resv);if(!items.length){alert('目前沒有預約');return;}
 const head=['書編號','書名','預約人','取書日期','備註','預約時間'];
 const esc2=s=>'"'+String(s||'').replace(/"/g,'""')+'"';
 const rows=items.map(r=>[r.no,r.title,r.name,r.pickup,r.note,r.ts].map(esc2).join(','));
 const csv='﻿'+head.join(',')+'\n'+rows.join('\n');
 const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);
 const a=document.createElement('a');a.href=url;a.download='預約紀錄.csv';document.body.appendChild(a);a.click();a.remove();
 setTimeout(()=>URL.revokeObjectURL(url),1000);}
function cancel(no){if(!confirm('確定取消這筆預約？'))return;delete resv[no];save();closeSheet();render();}
function show(h){document.getElementById('sheet').innerHTML=h;document.getElementById('sheet').classList.add('show');document.getElementById('scrim').classList.add('show');}
function closeSheet(){document.getElementById('sheet').classList.remove('show');document.getElementById('scrim').classList.remove('show');}
document.getElementById('q').addEventListener('input',()=>{if(tab==='list')renderList();});
updBadge();render();loadRemote();
setInterval(()=>{if(document.visibilityState==='visible')loadRemote();},30000);
</script></body></html>
